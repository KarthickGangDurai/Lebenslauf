<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resume Builder | Lebenslauf Generator</title>
    <style>
        :root {
            --primary: #1a365d;
            --secondary: #2c5282;
            --accent: #e53e3e;
            --bg: #f7fafc;
            --card: #ffffff;
            --text: #2d3748;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Header */
        .header-bar {
            background: var(--primary);
            color: white;
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .header-bar h1 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .lang-toggle {
            display: flex;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        .lang-toggle button {
            border: none;
            background: transparent;
            color: white;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            min-height: 36px;
        }

        .lang-toggle button.active {
            background: white;
            color: var(--primary);
        }

        /* Mobile Tabs */
        .mobile-tabs {
            display: none;
            background: white;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 48px;
            z-index: 99;
        }

        .mobile-tabs .tab-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: white;
            color: #718096;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }

        .mobile-tabs .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: #ebf8ff;
        }

        /* Main Layout */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
            min-height: calc(100vh - 60px);
        }

        .panel {
            background: var(--card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: fit-content;
        }

        .panel-header {
            background: var(--secondary);
            color: white;
            padding: 0.875rem 1.25rem;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-body {
            padding: 1.25rem;
            overflow-y: auto;
            max-height: calc(100vh - 160px);
        }

        /* Form Sections */
        .form-section {
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            background: white;
        }

        .form-section-title {
            background: #edf2f7;
            padding: 0.875rem 1rem;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            font-size: 0.95rem;
            min-height: 48px;
        }

        .form-section-content {
            padding: 1rem;
            display: none;
        }

        .form-section.active .form-section-content {
            display: block;
        }

        .form-section.active .toggle-icon {
            transform: rotate(180deg);
        }

        .toggle-icon {
            transition: transform 0.3s;
            font-size: 0.8rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.35rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: #4a5568;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.75rem 0.875rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            -webkit-appearance: none;
            appearance: none;
            min-height: 44px;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(44, 82, 130, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .btn {
            padding: 0.75rem 1.25rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 44px;
            touch-action: manipulation;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-secondary {
            background: #edf2f7;
            color: var(--text);
        }

        .btn-danger {
            background: #fed7d7;
            color: #c53030;
        }

        .btn-success {
            background: #c6f6d5;
            color: #22543d;
        }

        .entry-card {
            background: #f7fafc;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .entry-title {
            font-weight: 600;
            color: var(--primary);
            font-size: 0.9rem;
        }

        .bullet-list {
            list-style: none;
        }

        .bullet-item {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            align-items: center;
        }

        .bullet-item input {
            flex: 1;
            min-height: 44px;
        }

        .bullet-dot {
            color: var(--accent);
            font-weight: bold;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .action-bar {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .action-bar .btn {
            flex: 1;
            min-width: 120px;
        }

        /* PHOTO UPLOAD */
        .photo-upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            padding: 1.5rem;
            border: 2px dashed var(--border);
            border-radius: 12px;
            background: #f7fafc;
            margin-bottom: 1rem;
            text-align: center;
        }

        .photo-preview {
            width: 120px;
            height: 150px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid var(--border);
            display: none;
            background: white;
        }

        .photo-preview.visible {
            display: block;
        }

        .photo-placeholder {
            width: 120px;
            height: 150px;
            border-radius: 8px;
            border: 2px dashed #a0aec0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a0aec0;
            font-size: 2.5rem;
            background: white;
        }

        .photo-placeholder.hidden {
            display: none;
        }

        .photo-btn {
            background: var(--secondary);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .photo-btn:active {
            transform: scale(0.98);
        }

        .photo-hint {
            font-size: 0.75rem;
            color: #718096;
        }

        /* ============================================
           A4 SINGLE COLUMN PREVIEW - MATCHES ORIGINAL
           ============================================ */
        .preview-wrapper {
            padding: 0;
            background: #cbd5e0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            justify-content: center;
            min-height: 600px;
        }

        .a4-page {
            width: 210mm;
            min-height: 297mm;
            max-height: 297mm;
            background: white;
            /* Tighter margins like original */
            padding: 15mm 15mm;
            font-family: 'Calibri', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            color: #1a202c;
            line-height: 1.15;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* A4 Header with Photo */
        .a4-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2.5px solid #1a365d;
            padding-bottom: 8px;
            margin-bottom: 10px;
            gap: 12px;
        }

        .a4-header-left {
            flex: 1;
            min-width: 0;
        }

        .a4-header-right {
            flex-shrink: 0;
        }

        /* Photo: 3.0 x 4.0 cm = 30 x 40 mm */
        .a4-photo {
            width: 30mm;
            height: 40mm;
            object-fit: cover;
            border-radius: 2px;
            border: 1px solid #e2e8f0;
            display: block;
        }

        .a4-photo-empty {
            width: 30mm;
            height: 40mm;
            border-radius: 2px;
            border: 2px dashed #cbd5e0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #cbd5e0;
            font-size: 1.5rem;
            background: #f7fafc;
        }

        /* Name: BIGGER like original - 20pt Bold */
        .a4-name {
            font-size: 20pt;
            font-weight: 700;
            color: #1a365d;
            margin-bottom: 3px;
            line-height: 1.15;
        }

        /* Title: BIGGER + BOLD like original - 13pt Bold */
        .a4-title {
            font-size: 13pt;
            color: #4a5568;
            margin-bottom: 5px;
            font-weight: 700;
        }

        /* Contact: 10pt */
        .a4-contact {
            font-size: 10pt;
            color: #718096;
            word-break: break-word;
            display: flex;
            flex-wrap: wrap;
            gap: 6px 14px;
        }

        .a4-contact-item {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        /* A4 Single Column Body */
        .a4-body {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .a4-section {
            margin-bottom: 0;
        }

        /* Section headings: 12pt Bold */
        .a4-section-title {
            font-size: 12pt;
            font-weight: 700;
            color: #1a365d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1.5px solid #1a365d;
            padding-bottom: 3px;
            margin-bottom: 5px;
        }

        .a4-section-content {
            font-size: 10pt;
            color: #2d3748;
        }

        .a4-entry {
            margin-bottom: 6px;
        }

        .a4-entry:last-child {
            margin-bottom: 0;
        }

        .a4-entry-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* Entry title: 10.5pt Bold */
        .a4-entry-title {
            font-weight: 700;
            color: #2d3748;
            font-size: 10.5pt;
        }

        /* Date: 10pt */
        .a4-entry-date {
            font-size: 10pt;
            color: #718096;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* Subtitle: 10pt italic */
        .a4-entry-subtitle {
            font-size: 10pt;
            color: #4a5568;
            font-style: italic;
            margin-bottom: 1px;
        }

        /* Bullets: 10pt */
        .a4-bullets {
            list-style: disc;
            padding-left: 14px;
            font-size: 10pt;
            color: #4a5568;
            margin: 0;
        }

        .a4-bullets li {
            margin-bottom: 0px;
            line-height: 1.3;
        }

        /* Skills block: 10pt */
        .a4-skills-block {
            font-size: 10pt;
            color: #2d3748;
            line-height: 1.35;
        }

        .a4-skills-block strong {
            color: #1a365d;
        }

        .a4-skills-block div {
            margin-bottom: 2px;
        }

        /* Projects: 10pt */
        .a4-project-item {
            font-size: 10pt;
            color: #4a5568;
            margin-bottom: 2px;
            line-height: 1.3;
        }

        .a4-project-item::before {
            content: "•";
            color: #e53e3e;
            font-weight: bold;
            margin-right: 4px;
        }

        /* Personal details: 10pt */
        .a4-personal-row {
            font-size: 10pt;
            color: #4a5568;
            margin-bottom: 1px;
        }

        .a4-personal-label {
            font-weight: 600;
            color: #2d3748;
        }

        /* Overflow warning */
        .overflow-warning {
            position: absolute;
            bottom: 5mm;
            left: 50%;
            transform: translateX(-50%);
            background: #fed7d7;
            color: #c53030;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 8pt;
            font-weight: 600;
            display: none;
            z-index: 10;
            white-space: nowrap;
        }

        .overflow-warning.visible {
            display: block;
        }

        /* Print Button */
        .print-btn {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.3rem;
            box-shadow: 0 4px 12px rgba(229, 62, 62, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            touch-action: manipulation;
        }

        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
                gap: 1rem;
                padding: 1rem;
            }

            .panel-body {
                max-height: none;
            }

            .mobile-tabs {
                display: flex;
            }

            .panel {
                display: none;
            }

            .panel.active {
                display: flex;
            }

            .a4-page {
                transform: scale(0.55);
                transform-origin: top center;
                margin: 0 auto;
            }
        }

        @media (max-width: 640px) {
            .header-bar h1 {
                font-size: 1rem;
            }

            .row {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }

            .panel-header {
                padding: 0.75rem 1rem;
                font-size: 0.95rem;
            }

            .panel-body {
                padding: 1rem;
            }

            .form-section-title {
                padding: 0.75rem 0.875rem;
                font-size: 0.9rem;
            }

            .form-section-content {
                padding: 0.875rem;
            }

            .entry-card {
                padding: 0.875rem;
            }

            .btn {
                padding: 0.625rem 1rem;
                font-size: 0.9rem;
            }

            .action-bar .btn {
                flex: 1 1 100%;
            }

            .photo-upload-area {
                padding: 1rem;
            }

            .photo-preview, .photo-placeholder {
                width: 100px;
                height: 125px;
            }

            .print-btn {
                width: 52px;
                height: 52px;
                bottom: 1rem;
                right: 1rem;
            }

            .a4-page {
                transform: scale(0.42);
                transform-origin: top center;
            }
        }

        @media print {
            .header-bar, .mobile-tabs, .panel:first-child, .print-btn, .overflow-warning {
                display: none !important;
            }
            .main-container {
                grid-template-columns: 1fr !important;
                padding: 0;
                gap: 0;
                margin: 0;
                max-width: none;
            }
            .panel {
                display: flex !important;
                box-shadow: none;
                border-radius: 0;
                max-width: none;
            }
            .panel-header {
                display: none;
            }
            .panel-body {
                padding: 0;
                max-height: none;
                overflow: visible;
            }
            .preview-wrapper {
                background: white;
                overflow: visible;
                justify-content: flex-start;
            }
            .a4-page {
                transform: none !important;
                width: 210mm;
                height: 297mm;
                max-height: 297mm;
                box-shadow: none;
                padding: 15mm 15mm;
                margin: 0;
                page-break-after: always;
            }
            body {
                background: white;
            }
        }

        @page {
            size: A4;
            margin: 0;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="header-bar">
        <h1 id="app-title">Resume Builder</h1>
        <div class="lang-toggle">
            <button class="active" onclick="setLang('en')" id="btn-en">EN</button>
            <button onclick="setLang('de')" id="btn-de">DE</button>
        </div>
    </div>

    <div class="mobile-tabs">
        <button class="tab-btn active" onclick="switchTab('form')" id="tab-form">📝 Form</button>
        <button class="tab-btn" onclick="switchTab('preview')" id="tab-preview">👁️ Preview</button>
    </div>

    <div class="main-container">
        <!-- FORM PANEL -->
        <div class="panel active" id="panel-form">
            <div class="panel-header">
                <span id="form-title">Fill Your Information</span>
                <span style="font-size:0.8rem; opacity:0.8;" id="form-subtitle">Live updates</span>
            </div>
            <div class="panel-body">

                <!-- Personal Info -->
                <div class="form-section active">
                    <div class="form-section-title" onclick="toggleSection(this)">
                        <span id="sec-personal">Personal Information</span>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="form-section-content">

                        <!-- PHOTO UPLOAD -->
                        <div class="photo-upload-area">
                            <div style="display:flex; gap:10px; align-items:center;">
                                <img id="photo-preview" class="photo-preview" src="" alt="Photo">
                                <div id="photo-placeholder" class="photo-placeholder">👤</div>
                            </div>
                            <label for="photo-input" class="photo-btn" id="photo-btn-label">📷 Choose Photo</label>
                            <input type="file" id="photo-input" accept="image/*" style="display:none;" onchange="handlePhotoUpload(event)">
                            <div class="photo-hint" id="photo-hint">Tap to upload passport photo (3.0 x 4.0 cm)</div>
                        </div>

                        <div class="row">
                            <div class="form-group">
                                <label id="lbl-name">Full Name *</label>
                                <input type="text" id="input-name" placeholder="e.g. Max Mustermann" oninput="updatePreview()">
                            </div>
                            <div class="form-group">
                                <label id="lbl-title">Professional Title</label>
                                <input type="text" id="input-title" placeholder="e.g. Aerospace Engineer" oninput="updatePreview()">
                            </div>
                        </div>
                        <div class="row">
                            <div class="form-group">
                                <label id="lbl-location">Location</label>
                                <input type="text" id="input-location" placeholder="e.g. Vienna, Austria" oninput="updatePreview()">
                            </div>
                            <div class="form-group">
                                <label id="lbl-phone">Phone</label>
                                <input type="text" id="input-phone" placeholder="e.g. +43 660 9602552" oninput="updatePreview()">
                            </div>
                        </div>
                        <div class="row">
                            <div class="form-group">
                                <label>LinkedIn</label>
                                <input type="text" id="input-linkedin" placeholder="LinkedIn Profile URL" oninput="updatePreview()">
                            </div>
                            <div class="form-group">
                                <label id="lbl-email">Email</label>
                                <input type="email" id="input-email" placeholder="email@example.com" oninput="updatePreview()">
                            </div>
                        </div>
                        <div class="row">
                            <div class="form-group">
                                <label id="lbl-dob">Date of Birth</label>
                                <input type="text" id="input-dob" placeholder="e.g. 01/01/1990" oninput="updatePreview()">
                            </div>
                            <div class="form-group">
                                <label id="lbl-visa">Visa Type</label>
                                <input type="text" id="input-visa" placeholder="e.g. RWR+ Card" oninput="updatePreview()">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Experience -->
                <div class="form-section">
                    <div class="form-section-title" onclick="toggleSection(this)">
                        <span id="sec-experience">Professional Experience</span>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="form-section-content">
                        <div id="experience-container"></div>
                        <button class="btn btn-primary" onclick="addExperience()" id="btn-add-exp" style="width:100%;">+ Add Experience</button>
                    </div>
                </div>

                <!-- Education -->
                <div class="form-section">
                    <div class="form-section-title" onclick="toggleSection(this)">
                        <span id="sec-education">Education</span>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="form-section-content">
                        <div id="education-container"></div>
                        <button class="btn btn-primary" onclick="addEducation()" id="btn-add-edu" style="width:100%;">+ Add Education</button>
                    </div>
                </div>

                <!-- Skills -->
                <div class="form-section">
                    <div class="form-section-title" onclick="toggleSection(this)">
                        <span id="sec-skills">Skills & Certificates</span>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="form-section-content">
                        <div class="form-group">
                            <label id="lbl-software">Software</label>
                            <input type="text" id="input-software" placeholder="e.g. CATIA V5, ANSYS, SolidWorks..." oninput="updatePreview()">
                        </div>
                        <div class="form-group">
                            <label id="lbl-embedded">Embedded Systems & Electronics</label>
                            <input type="text" id="input-embedded" placeholder="e.g. Embedded C, STM32..." oninput="updatePreview()">
                        </div>
                        <div class="form-group">
                            <label id="lbl-regulations">Regulations</label>
                            <input type="text" id="input-regulations" placeholder="e.g. EASA Part 21J/G..." oninput="updatePreview()">
                        </div>
                        <div class="form-group">
                            <label id="lbl-languages">Languages</label>
                            <input type="text" id="input-languages" placeholder="e.g. English (C2), German (A2)..." oninput="updatePreview()">
                        </div>
                        <div class="form-group">

        function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (file) {

                reader.onload = function(e) {
                    photoDataUrl = e.target.result;
                    document.getElementById('photo-preview').src = photoDataUrl;
                    document.getElementById('photo-preview').classList.add('visible');
                    document.getElementById('photo-placeholder').classList.add('hidden');

        function checkOverflow() {
            const page = document.getElementById('resume-preview');
            const warning = document.getElementById('overflow-warning');
            const maxHeight = 1123; // 297mm at 96dpi
            const actualHeight = page.scrollHeight;
            if (actualHeight > maxHeight) {
                warning.classList.add('visible');
                warning.textContent = translations[currentLang].overflowWarning;
            } else {
                warning.classList.remove('visible');
            }
        }

            const t = translations[currentLang];
            const name = document.getElementById('input-name').value;

                    <div class="a4-section">
                        <div class="a4-section-title">${t.previewSkills}</div>
                        <div class="a4-section-content">
                            <div class="a4-skills-block">
                                ${software ? `<div><strong>${t.lblSoftware}:</strong> ${software}</div>` : ''}
                                ${embedded ? `<div><strong>${t.lblEmbedded}:</strong> ${embedded}</div>` : ''}
                                ${regulations ? `<div><strong>${t.lblRegulations}:</strong> ${regulations}</div>` : ''}
                                ${languages ? `<div><strong>${t.lblLanguages}:</strong> ${languages}</div>` : ''}
                                ${certificates ? `<div><strong>${t.lblCertificates}:</strong> ${certificates}</div>` : ''}
                                ${interests ? `<div><strong>${t.lblInterests}:</strong> ${interests}</div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }

            // 5. Projects
            let projectsHTML = '';
            const projCards = document.querySelectorAll('[id^="proj-"]');
            if (projCards.length > 0) {
                projectsHTML = `<div class="a4-section"><div class="a4-section-title">${t.previewProjects}</div><div class="a4-section-content">`;
                projCards.forEach(card => {
                    const name = card.querySelector('.proj-name')?.value || '';
                    const desc = card.querySelector('.proj-desc')?.value || '';
                    if (name) {
                        projectsHTML += `<div class="a4-project-item"><strong>${name}</strong>${desc ? ` — ${desc}` : ''}</div>`;
                    }
                });
                projectsHTML += `</div></div>`;
            }
            sectionsHTML += projectsHTML;

            const preview = document.getElementById('resume-preview');
            preview.innerHTML = `
                <div class="overflow-warning" id="overflow-warning"></div>
                <div class="a4-header">
                    <div class="a4-header-left">
                        <div class="a4-name">${name || (currentLang === 'de' ? 'Ihr Name' : 'Your Name')}</div>
                        <div class="a4-title">${title || (currentLang === 'de' ? 'Ihr Titel' : 'Your Title')}</div>
                        <div class="a4-contact">${contactParts.join('') || (currentLang === 'de' ? 'Ihre Kontaktdaten' : 'Your Contact Info')}</div>
                    </div>
                    <div class="a4-header-right">
                        ${photoHTML}
                    </div>
                </div>
                <div class="a4-body">
                    ${sectionsHTML || '<div style="color:#a0aec0; font-size:10pt; font-style:italic; text-align:center; padding-top:50px;">' + (currentLang === 'de' ? 'Füllen Sie das Formular aus, um Ihren Lebenslauf zu sehen' : 'Fill the form to see your resume') + '</div>'}
                </div>
            `;

            setTimeout(checkOverflow, 50);
        }
